<!DOCTYPE html>
<html>
    <head>
        <title> DSS Games Signup </title>
        <meta charset="utf-8">
        <link rel="icon" type="image/x-icon" href="../imgs/foodie.ico">
        <link rel="stylesheet" href="../css/style.css">
    </head>

    <body>
        <header>
            <a href="../html/index.html"><img id="logo" src="../imgs/logo.png"></a>
            <h1>Sign up to DSS Games!</h1>
        </header>
        <main>
        <p>(placeholder)</p>

        <form method="post" action="/signup" id="signup_form">
            <label for="username_input">Username:</label>
            <input type="text" id="username_input" name="username_input" placeholder="Please enter your username...">

            <label for="email_input">Email Address:</label>
            <input type="text" id="email_input" name="email_input" placeholder="Please enter your email address...">

            <label for="password_input">Password:</label>
            <input type="password" id="password_input" name="password_input" placeholder="Please enter your password...">

            <label for="passwordConfirm_input">Confirm Password:</label>
            <input type="password" id="passwordConfirm_input" name="passwordConfirm_input" placeholder="Please re-enter your password...">

            <button id="login_btn" type="submit">Log in</button>
        </form>
        </main>
    </body>
</html>
